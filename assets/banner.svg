<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <pattern id="grid-sm" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-lg" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid-sm)"/>
  <rect width="1200" height="320" fill="url(#grid-lg)"/>
  <rect x="20" y="20" width="1160" height="280" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <rect x="30" y="30" width="1140" height="260" rx="8" fill="none" stroke="rgba(96,165,250,0.2)" stroke-width="0.75"/>
  <line x1="40" y1="40" x2="60" y2="40" stroke="#60a5fa" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="60" stroke="#60a5fa" stroke-width="2"/>
  <line x1="1160" y1="40" x2="1140" y2="40" stroke="#60a5fa" stroke-width="2"/>
  <line x1="1160" y1="40" x2="1160" y2="60" stroke="#60a5fa" stroke-width="2"/>
  <line x1="40" y1="280" x2="60" y2="280" stroke="#60a5fa" stroke-width="2"/>
  <line x1="40" y1="280" x2="40" y2="260" stroke="#60a5fa" stroke-width="2"/>
  <line x1="1160" y1="280" x2="1140" y2="280" stroke="#60a5fa" stroke-width="2"/>
  <line x1="1160" y1="280" x2="1160" y2="260" stroke="#60a5fa" stroke-width="2"/>
  <text x="600" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="8">MARNIN AUDU</text>
  <text x="600" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#93c5fd" letter-spacing="12" font-weight="300">SOFTWARE ENGINEER</text>
  <line x1="380" y1="180" x2="820" y2="180" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="600" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.85)" font-style="italic">I build products that feel like magic and work like clockwork</text>
  <g transform="translate(340, 245)">
    <rect x="0" y="0" width="90" height="24" rx="4" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="0.5"/>
    <text x="45" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">React</text>
  </g>
