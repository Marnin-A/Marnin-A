    <text x="45" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Linux</text>
  </g>
  <text x="50" y="295" font-family="monospace" font-size="9" fill="rgba(147,197,253,0.4)">SCALE 1:1 // REV A</text>
  <text x="1150" y="295" text-anchor="end" font-family="monospace" font-size="9" fill="rgba(147,197,253,0.4)">marnin.dev</text>
