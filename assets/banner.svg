    <text x="45" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Python</text>
  </g>
  <g transform="translate(640, 245)">
    <rect x="0" y="0" width="90" height="24" rx="4" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="0.5"/>
    <text x="45" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Docker</text>
  </g>
